<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="./Styles/dashboard.css">
</head>
<body>
    <header>
        <h1>Prizoscope Admin</h1>
        <nav>
            <a href="messages.html">Customer</a>
            <a href="Dashboard.html" class="active">Dashboard</a>
            <a href="Catelog.html">Catalog</a>
        </nav>
    </header>
    <div class="content">
        <div class="dashboard-section">
            <h2>Current Promotions</h2>
            <div id="current-promotions-list">
            </div>
        </div>
        <div class="dashboard-section">
            <h2>Past Promotions</h2>
            <div id="past-promotions-list">
            </div>
        </div>
    </div>
    <div id="promotion-modal" class="popup">
        <div class="popup-content">
            <h2>Edit Promotion</h2>
            <label for="edit-discount-price">Discount Price:</label>
            <input type="number" id="edit-discount-price" placeholder="Enter new discounted price">
            <label for="edit-duration">Extend Duration (hours):</label>
            <input type="number" id="edit-duration" placeholder="Enter additional hours">
            <div class="popup-buttons">
                <button id="save-edit-promotion-btn">Save Changes</button>
                <button onclick="closeEditModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="./Javascript/Dashboard.js"></script>
</body>
</html>
